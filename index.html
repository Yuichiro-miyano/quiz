<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>極洋の守護者 〜情報セキュリティ冒険記〜</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap');

        :root {
            --primary: #0f172a;
            --primary-light: #1e293b;
            --accent: #6366f1;
            --accent-light: #818cf8;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --gold: #f59e0b;
            --gold-light: #fbbf24;
            --success: #10b981;
            --success-bg: rgba(16, 185, 129, 0.1);
            --danger: #ef4444;
            --danger-bg: rgba(239, 68, 68, 0.1);
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --card-bg: rgba(30, 41, 59, 0.8);
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --radius: 16px;
            --radius-sm: 8px;
            --font: 'Noto Sans JP', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font);
            background: var(--primary);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(245, 158, 11, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(16, 185, 129, 0.08) 0%, transparent 50%);
            z-index: 0;
            animation: bgShift 20s ease-in-out infinite alternate;
        }

        @keyframes bgShift {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        /* Floating particles */
        .particles {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px; height: 4px;
            background: var(--accent-light);
            border-radius: 50%;
            opacity: 0;
            animation: float linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 1rem;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 2rem 1rem;
            margin-bottom: 1rem;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-light), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }

        .header .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 300;
        }

        /* Status Bar */
        .status-bar {
            display: none;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
        }

        .status-bar.active { display: flex; }

        .status-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
        }

        .status-item .icon {
            font-size: 1.2rem;
        }

        .status-item .label {
            color: var(--text-muted);
        }

        .status-item .value {
            font-weight: 700;
            color: var(--gold);
        }

        /* XP Bar */
        .xp-bar-container {
            display: none;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 1rem 1.5rem;
            margin-bottom: 1.5rem;
        }

        .xp-bar-container.active { display: block; }

        .xp-bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .xp-bar {
            height: 8px;
            background: var(--glass);
            border-radius: 4px;
            overflow: hidden;
        }

        .xp-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--gold));
            border-radius: 4px;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            width: 0%;
        }

        /* Cards */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 2rem;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
        }

        .card.glow {
            box-shadow: 0 0 30px var(--accent-glow);
        }

        /* Login Screen */
        .login-screen {
            text-align: center;
            padding: 3rem 2rem;
        }

        .login-screen .mascot {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            margin: 0 auto 1.5rem;
            object-fit: cover;
            box-shadow: 0 0 30px var(--accent-glow);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px var(--accent-glow); }
            50% { box-shadow: 0 0 40px var(--accent-glow), 0 0 60px rgba(99,102,241,0.1); }
        }

        .login-screen h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        .login-screen p {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .input-group {
            max-width: 400px;
            margin: 0 auto 1rem;
        }

        .input-group label {
            display: block;
            text-align: left;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        .input-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-size: 1rem;
            font-family: var(--font);
            outline: none;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .input-group input::placeholder {
            color: #475569;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.8rem 2rem;
            border: none;
            border-radius: var(--radius-sm);
            font-family: var(--font);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #4f46e5);
            color: white;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px var(--accent-glow);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-gold {
            background: linear-gradient(135deg, var(--gold), #d97706);
            color: white;
            box-shadow: 0 4px 15px rgba(245,158,11,0.3);
        }

        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(245,158,11,0.4);
        }

        .btn-outline {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--glass-border);
        }

        .btn-outline:hover {
            background: var(--glass);
            color: var(--text);
            border-color: var(--accent);
        }

        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
        }

        /* Story Area */
        .story-area {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .story-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            object-fit: cover;
            flex-shrink: 0;
        }

        .story-text {
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-muted);
        }

        .story-text strong {
            color: var(--accent-light);
        }

        /* Progress */
        .progress-indicator {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .progress-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--glass);
            border: 2px solid var(--glass-border);
            transition: all 0.3s;
        }

        .progress-dot.completed {
            background: var(--success);
            border-color: var(--success);
        }

        .progress-dot.wrong {
            background: var(--danger);
            border-color: var(--danger);
        }

        .progress-dot.current {
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
            animation: dotPulse 1.5s ease-in-out infinite;
        }

        @keyframes dotPulse {
            0%, 100% { box-shadow: 0 0 5px var(--accent-glow); }
            50% { box-shadow: 0 0 15px var(--accent-glow); }
        }

        .stage-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--accent), #4f46e5);
            color: white;
            padding: 0.3rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        /* Question */
        .question-number {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .question-text {
            font-size: 1.15rem;
            font-weight: 500;
            line-height: 1.7;
            margin-bottom: 1.5rem;
        }

        /* Choices */
        .choices {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .choice-btn {
            display: flex;
            align-items: center;
            gap: 1rem;
            width: 100%;
            padding: 1rem 1.25rem;
            background: var(--glass);
            border: 2px solid var(--glass-border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: var(--font);
            font-size: 0.95rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.3s;
            line-height: 1.5;
        }

        .choice-btn:hover:not(:disabled) {
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.08);
        }

        .choice-btn.selected {
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.15);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .choice-btn:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        .choice-btn.correct-reveal {
            border-color: var(--success) !important;
            background: var(--success-bg) !important;
            opacity: 1 !important;
        }

        .choice-btn.wrong-reveal {
            border-color: var(--danger) !important;
            background: var(--danger-bg) !important;
            opacity: 1 !important;
        }

        .choice-letter {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            font-weight: 700;
            font-size: 0.85rem;
            flex-shrink: 0;
            color: var(--text-muted);
        }

        .choice-btn.selected .choice-letter {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        /* Feedback */
        .feedback {
            display: none;
            margin-top: 1.5rem;
            padding: 1.5rem;
            border-radius: var(--radius);
            text-align: center;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .feedback.show { display: block; }

        .feedback.correct {
            background: var(--success-bg);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .feedback.incorrect {
            background: var(--danger-bg);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .feedback-img {
            width: 180px;
            height: 120px;
            border-radius: var(--radius-sm);
            margin-bottom: 1rem;
            object-fit: cover;
        }

        .feedback-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .feedback.correct .feedback-title { color: var(--success); }
        .feedback.incorrect .feedback-title { color: var(--danger); }

        .feedback-msg {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        /* Explanation panel */
        .explanation-panel {
            display: none;
            text-align: left;
            margin-top: 1rem;
            padding: 1.25rem;
            background: rgba(0,0,0,0.2);
            border-radius: var(--radius-sm);
            border-left: 4px solid var(--accent);
        }

        .explanation-panel.show { display: block; }

        .explanation-panel h4 {
            color: var(--accent-light);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .explanation-panel p {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 0.75rem;
        }

        .explanation-panel .metaphor {
            background: rgba(245,158,11,0.1);
            border: 1px solid rgba(245,158,11,0.2);
            border-radius: var(--radius-sm);
            padding: 0.75rem 1rem;
            margin: 0.75rem 0;
            font-size: 0.85rem;
            color: var(--gold-light);
        }

        .explanation-panel .supplement {
            background: rgba(99,102,241,0.1);
            border: 1px solid rgba(99,102,241,0.2);
            border-radius: var(--radius-sm);
            padding: 0.75rem 1rem;
            margin: 0.75rem 0;
            font-size: 0.85rem;
            color: var(--accent-light);
        }

        /* Badge Popup */
        .badge-popup {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            background: var(--primary-light);
            border: 2px solid var(--gold);
            border-radius: var(--radius);
            padding: 2rem;
            text-align: center;
            z-index: 100;
            box-shadow: 0 0 60px rgba(245,158,11,0.4);
            animation: badgeAppear 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .badge-popup.show {
            display: block;
        }

        @keyframes badgeAppear {
            from { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .badge-popup .badge-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .badge-popup .badge-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 0.25rem;
        }

        .badge-popup .badge-desc {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 99;
        }

        .overlay.show { display: block; }

        /* Game Over */
        .game-over {
            display: none;
            text-align: center;
        }

        .game-over.show { display: block; }

        .final-score {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-light), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .final-title {
            font-size: 1.2rem;
            color: var(--gold);
            margin-bottom: 2rem;
        }

        .badges-earned {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .badge-item {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            padding: 0.75rem 1rem;
            font-size: 0.85rem;
        }

        .badge-item .badge-emoji {
            font-size: 1.5rem;
            display: block;
            margin-bottom: 0.25rem;
        }

        /* Wrong answers review */
        .wrong-review {
            text-align: left;
            margin: 2rem 0;
        }

        .wrong-review h3 {
            color: var(--danger);
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        .wrong-item {
            background: var(--danger-bg);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: var(--radius-sm);
            padding: 1rem;
            margin-bottom: 0.75rem;
        }

        .wrong-item .wrong-q {
            font-weight: 500;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .wrong-item .wrong-a {
            color: var(--success);
            font-size: 0.85rem;
        }

        .wrong-item .wrong-exp {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }

        .btn-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 1.5rem;
        }

        /* Scoreboard */
        .scoreboard {
            display: none;
            margin-top: 2rem;
        }

        .scoreboard.show { display: block; }

        .scoreboard h3 {
            color: var(--gold);
            font-size: 1.1rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        .scoreboard-table {
            width: 100%;
            border-collapse: collapse;
        }

        .scoreboard-table th {
            background: var(--glass);
            color: var(--text-muted);
            padding: 0.6rem 1rem;
            font-size: 0.8rem;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
        }

        .scoreboard-table td {
            padding: 0.6rem 1rem;
            font-size: 0.85rem;
            border-bottom: 1px solid var(--glass-border);
        }

        .scoreboard-table tr:hover td {
            background: var(--glass);
        }

        .rank-1 { color: var(--gold); font-weight: 700; }
        .rank-2 { color: #94a3b8; font-weight: 700; }
        .rank-3 { color: #b45309; font-weight: 700; }

        /* Level up animation */
        .level-up-flash {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, rgba(245,158,11,0.3), transparent 70%);
            z-index: 98;
            pointer-events: none;
            opacity: 0;
            animation: flashIn 1s ease-out forwards;
        }

        @keyframes flashIn {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* Confetti */
        .confetti-piece {
            position: fixed;
            width: 10px;
            height: 10px;
            z-index: 200;
            pointer-events: none;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .header h1 { font-size: 1.4rem; }
            .card { padding: 1.25rem; }
            .story-area { flex-direction: column; text-align: center; }
            .status-bar { justify-content: center; }
            .btn-group { flex-direction: column; align-items: center; }
        }

        .hidden { display: none !important; }

        /* Scoreboard admin section */
        .admin-section {
            margin-top: 2rem;
            padding: 1.5rem;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
        }

        .admin-section h3 {
            color: var(--accent-light);
            margin-bottom: 1rem;
            text-align: center;
        }

        .toggle-scoreboard {
            cursor: pointer;
            color: var(--text-muted);
            font-size: 0.85rem;
            text-align: center;
            margin-top: 1rem;
            text-decoration: underline;
        }

        .toggle-scoreboard:hover { color: var(--accent-light); }

        /* Correct answer highlight in feedback */
        .correct-answer-display {
            display: inline-block;
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: var(--radius-sm);
            padding: 0.3rem 0.8rem;
            color: var(--success);
            font-weight: 500;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>

<!-- Particles Background -->
<div class="particles" id="particles"></div>

<!-- Overlay for popups -->
<div class="overlay" id="overlay"></div>

<!-- Badge popup -->
<div class="badge-popup" id="badgePopup">
    <div class="badge-icon" id="badgeIcon"></div>
    <div class="badge-title" id="badgeTitle"></div>
    <div class="badge-desc" id="badgeDesc"></div>
</div>

<div class="container">
    <div class="header">
        <h1>極洋の守護者</h1>
        <div class="subtitle">〜情報セキュリティ冒険記〜</div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar" id="statusBar">
        <div class="status-item">
            <span class="icon">&#x2694;&#xFE0F;</span>
            <span class="label">勇者:</span>
            <span class="value" id="displayName">-</span>
        </div>
        <div class="status-item">
            <span class="icon">&#x2B50;</span>
            <span class="label">Lv.</span>
            <span class="value" id="displayLevel">1</span>
        </div>
        <div class="status-item">
            <span class="icon">&#x1F3C5;</span>
            <span class="label">称号:</span>

let playerEmail = "";
let playerName = "";
let quizStartTime = null;
let currentIndex = 0;
let totalXP = 0;
let playerLevel = 1;
let playerTitleName = "見習い守護者";
let wrongAnswers = [];

let progressStates = []; // 'pending', 'correct', 'wrong', 'current'

// ===== PARTICLES =====
function createParticles() {

// ===== SHARED SCOREBOARD CONFIG =====
// JSONBin.io を使ってスコアを共有します。
// セットアップ手順:
//   1. https://jsonbin.io/ で無料アカウントを作成
//   2. ダッシュボードで「Create Bin」→ 初期値 [] で作成
//   3. Bin ID と API Key をここに貼り付ける
const JSONBIN_BIN_ID  = '67f90f258960c979a5a0d2dc'; // ← Bin ID
const JSONBIN_API_KEY = '$2a$10$hLpW7OEBUCFSClAPk5Gll.sV2RdGT3EwSTekVvSBnY9A0YHuFVGGy'; // ← API Key
const JSONBIN_URL     = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`;

let scoreboardPollingInterval = null;

// ===== SCOREBOARD (JSONBin.io 共有 / localStorage フォールバック) =====
async function fetchScoreboard() {
    if (!JSONBIN_BIN_ID || JSONBIN_BIN_ID === 'YOUR_BIN_ID') {
        return getLocalScoreboard();
    }
    try {
        const res = await fetch(`${JSONBIN_URL}/latest`, {
            headers: { 'X-Access-Key': JSONBIN_API_KEY }
        });
        if (!res.ok) throw new Error('fetch failed');
        const data = await res.json();
        const record = data.record;
        return Array.isArray(record) ? record : [];
    } catch {
        return getLocalScoreboard();
    }
}

function getLocalScoreboard() {
    try { return JSON.parse(localStorage.getItem('kyokuyo_quiz_scores') || '[]'); }
    catch { return []; }
}

async function saveScore(email, name, score, correctCount, total, title) {
    const today = new Date().toLocaleDateString('ja-JP');
    const elapsed = quizStartTime ? Math.floor((Date.now() - quizStartTime) / 1000) : 9999;
    const entry = {
        email, name, score, correctCount, total, title,
        elapsed,
        date: new Date().toLocaleString('ja-JP'),
        day: today
    };

    const scores = await fetchScoreboard();
    const existing = scores.findIndex(s => s.email === email);
    if (existing >= 0) {
        if (score >= scores[existing].score) scores[existing] = entry;
    } else {
        scores.push(entry);
    }
    scores.sort((a, b) => b.score - a.score || (a.elapsed ?? 9999) - (b.elapsed ?? 9999));

    // ローカルにも保存（フォールバック用）
    localStorage.setItem('kyokuyo_quiz_scores', JSON.stringify(scores));

    if (!JSONBIN_BIN_ID || JSONBIN_BIN_ID === 'YOUR_BIN_ID') return;
    try {
        await fetch(JSONBIN_URL, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'X-Access-Key': JSONBIN_API_KEY
            },
            body: JSON.stringify(scores)
        });
    } catch { /* サーバー保存失敗時はローカルのみ */ }
}

async function renderScoreboard() {
    const today = new Date().toLocaleDateString('ja-JP');
    const allScores = await fetchScoreboard();
    const todayScores = allScores.filter(s => s.day === today);
    const display = todayScores.length > 0 ? todayScores : allScores;

    // 自分の順位を特定
    const myRank = display.findIndex(s => s.email === playerEmail);

    // 順位バナーを更新
    const banner = document.getElementById('myRankBanner');
    if (banner) {
        if (myRank >= 0) {
            const rankEmoji = myRank === 0 ? '🥇' : myRank === 1 ? '🥈' : myRank === 2 ? '🥉' : '🎖️';
            const rankNum = myRank + 1;
            const total = display.length;
            banner.innerHTML = `
                <div style="background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:1rem;padding:1.2rem 1.5rem;color:#fff;text-align:center">
                    <div style="font-size:2.5rem;line-height:1">${rankEmoji}</div>
                    <div style="font-size:1.1rem;margin-top:0.4rem;opacity:0.9">${escapeHtml(playerName)} さんの本日の順位</div>
                    <div style="font-size:2.8rem;font-weight:900;line-height:1.1">${rankNum}<span style="font-size:1.2rem;font-weight:600"> / ${total} 位</span></div>
                    <div style="font-size:0.9rem;opacity:0.85;margin-top:0.3rem">${totalXP} XP &nbsp;|&nbsp; ${escapeHtml(playerTitleName)}</div>
                </div>`;
        } else {
            banner.innerHTML = '';
        }
    }

    const tbody = document.getElementById('scoreboardBody');
    tbody.innerHTML = '';
    display.forEach((s, i) => {
        const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
        const rankLabel = i === 0 ? '\u{1F947}' : i === 1 ? '\u{1F948}' : i === 2 ? '\u{1F949}' : (i + 1);
        const isMe = s.email === playerEmail;
        const row = document.createElement('tr');
        if (isMe) row.style.cssText = 'background:rgba(99,102,241,0.15);font-weight:700;outline:2px solid var(--primary);outline-offset:-2px;';
        const sec = s.elapsed ?? null;
        const timeStr = sec != null ? `${Math.floor(sec/60)}:${String(sec%60).padStart(2,'0')}` : '-';
        row.innerHTML = `
            <td class="${rankClass}">${rankLabel}</td>
            <td>${escapeHtml(s.name)}${isMe ? ' <span style="font-size:0.7rem;background:var(--primary);color:#fff;padding:1px 6px;border-radius:4px;vertical-align:middle">あなた</span>' : ''}</td>
            <td>${s.score} XP</td>
            <td>${s.correctCount}/${s.total} (${Math.round(s.correctCount/s.total*100)}%)</td>
            <td style="font-size:0.85rem">${timeStr}</td>
            <td>${escapeHtml(s.title)}</td>
            <td style="font-size:0.75rem;color:var(--text-muted)">${s.date}</td>
        `;
        tbody.appendChild(row);
    });

    // 最終更新時刻を表示
    const status = document.getElementById('scoreboardStatus');
    if (status) {
        const now = new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        status.textContent = `🔄 ${now} 更新`;
    }
}

function startScoreboardPolling() {
    // ゲームオーバー後にバックグラウンドでデータを取得しておく
    fetchScoreboard().then(() => {});
    scoreboardPollingInterval = setInterval(() => {
        if (!document.getElementById('scoreboardScreen').classList.contains('hidden')) {
            renderScoreboard();
        }
    }, 15000);
}

function showScoreboard() {
    document.getElementById('gameOverScreen').classList.add('hidden');
    document.getElementById('scoreboardScreen').classList.remove('hidden');
    renderScoreboard();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function backToResults() {
    stopScoreboardPolling();
    document.getElementById('scoreboardScreen').classList.add('hidden');
    if (playerEmail === 'admin') {
        document.getElementById('loginScreen').classList.remove('hidden');
    } else {
        document.getElementById('gameOverScreen').classList.remove('hidden');
    }
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function stopScoreboardPolling() {
    if (scoreboardPollingInterval) {
        clearInterval(scoreboardPollingInterval);
        scoreboardPollingInterval = null;
    }
}

function clearScoreboard() {
    if (confirm('成績データをすべて削除しますか？')) {
        localStorage.removeItem('kyokuyo_quiz_scores');
        renderScoreboard();
    }
}

function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
}

// ===== GAME LOGIC =====
function startGame() {
    const email = document.getElementById('emailInput').value.trim();
    const name = document.getElementById('nameInput').value.trim();
    if (!email) {
        alert('メールアドレスを入力してください。');
        return;
    }
    // 管理者ショートカット
    if (email.toLowerCase() === 'admin') {
        playerEmail = 'admin';
        playerName = '管理者';
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('statusBar').classList.remove('active');
        document.getElementById('xpBarContainer').classList.remove('active');
        document.getElementById('scoreboardScreen').classList.remove('hidden');
        renderScoreboard();
        startScoreboardPolling();
        window.scrollTo({ top: 0, behavior: 'smooth' });
        return;
    }
    if (!name) {
        alert('表示名を入力してください。');
        return;
    }
    playerEmail = email;
    playerName = name;
    quizStartTime = Date.now();
    currentIndex = 0;
    totalXP = 0;
    playerLevel = 1;
    playerTitleName = "見習い守護者";
    wrongAnswers = [];
    selectedValue = null;
    earnedBadges = [];
    questions = [...ALL_QUESTIONS];
    progressStates = questions.map(() => 'pending');

    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('gameScreen').classList.remove('hidden');
    document.getElementById('gameOverScreen').classList.add('hidden');
    document.getElementById('statusBar').classList.add('active');
    document.getElementById('xpBarContainer').classList.add('active');

    updateStatus();
    loadQuestion();
}

function replayGame(shuffle) {
    stopScoreboardPolling();
    quizStartTime = Date.now();
    currentIndex = 0;
    totalXP = 0;
    playerLevel = 1;
    playerTitleName = "見習い守護者";
    wrongAnswers = [];
    selectedValue = null;
    earnedBadges = [];

    if (shuffle) {
        questions = [...ALL_QUESTIONS].sort(() => Math.random() - 0.5);
    } else {
        questions = [...ALL_QUESTIONS];
    }
    progressStates = questions.map(() => 'pending');

    document.getElementById('gameOverScreen').classList.add('hidden');
    document.getElementById('gameScreen').classList.remove('hidden');
    document.getElementById('statusBar').classList.add('active');
    document.getElementById('xpBarContainer').classList.add('active');

    updateStatus();
    loadQuestion();
}

function updateStatus() {
    document.getElementById('displayName').textContent = playerName;
    document.getElementById('displayLevel').textContent = playerLevel;
    document.getElementById('displayTitle').textContent = playerTitleName;
    document.getElementById('displayXP').textContent = totalXP;

    // XP bar
    const currentLevelXP = TITLES[playerLevel - 1]?.xp || 0;
    const nextLevelXP = TITLES[playerLevel]?.xp || 800;
    const progress = Math.min(((totalXP - currentLevelXP) / (nextLevelXP - currentLevelXP)) * 100, 100);
    document.getElementById('xpBarFill').style.width = progress + '%';
    document.getElementById('xpProgress').textContent = `${totalXP} / ${nextLevelXP} XP`;
}

function renderProgressDots() {
    const container = document.getElementById('progressDots');
    container.innerHTML = '';
    progressStates.forEach((state, i) => {
        const dot = document.createElement('div');
        dot.className = 'progress-dot';
        if (i === currentIndex) dot.classList.add('current');
        if (state === 'correct') dot.classList.add('completed');
        if (state === 'wrong') dot.classList.add('wrong');
        container.appendChild(dot);
    });
}

function loadQuestion() {
    if (currentIndex >= questions.length) {
        endGame();
        return;
    }

    const q = questions[currentIndex];
    const stage = STAGES[q.stage];

    // Story
    document.getElementById('storyImg').src = SAGE_IMG;
    document.getElementById('storyText').innerHTML =
        `<strong>賢者だんどり～にゃ：</strong>${stage.desc}`;

    // Stage badge
    document.getElementById('stageBadge').textContent = stage.chapter;
    document.getElementById('questionNumber').textContent = `問題 ${currentIndex + 1} / ${questions.length}`;
    document.getElementById('questionText').innerHTML = q.question;

    // Choices
    const choicesArea = document.getElementById('choicesArea');
    choicesArea.innerHTML = '';
    const letters = ['A', 'B', 'C', 'D'];
    q.choices.forEach((c, i) => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.innerHTML = `<span class="choice-letter">${letters[i]}</span><span>${c.text}</span>`;
        btn.dataset.value = c.value;
        btn.addEventListener('click', () => selectChoice(btn, c.value));
        choicesArea.appendChild(btn);
    });

    // Reset
    selectedValue = null;
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('feedbackArea').className = 'feedback';
    document.getElementById('feedbackArea').classList.remove('show');
    document.getElementById('explanationPanel').classList.remove('show');
    document.getElementById('nextBtn').classList.add('hidden');
    document.getElementById('submitBtn').style.display = '';

    renderProgressDots();
}

function selectChoice(btn, value) {
    document.querySelectorAll('.choice-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedValue = value;
    document.getElementById('submitBtn').disabled = false;
}

function submitAnswer() {
    if (!selectedValue) return;
    const q = questions[currentIndex];
    const isCorrect = selectedValue === q.correctAnswer;

    // Disable choices
    document.querySelectorAll('.choice-btn').forEach(btn => {
        btn.disabled = true;
        if (btn.dataset.value === q.correctAnswer) {
            btn.classList.add('correct-reveal');
        }
        if (btn.classList.contains('selected') && !isCorrect) {
            btn.classList.add('wrong-reveal');
        }
    });

    document.getElementById('submitBtn').style.display = 'none';

    const feedbackArea = document.getElementById('feedbackArea');

    if (isCorrect) {
        totalXP += 100;
        progressStates[currentIndex] = 'correct';

        feedbackArea.className = 'feedback correct show';
        document.getElementById('feedbackImg').src = CORRECT_IMGS[Math.floor(Math.random() * CORRECT_IMGS.length)];
        document.getElementById('feedbackTitle').textContent = '正解にゃ！';
        document.getElementById('feedbackMsg').textContent = `さすが${playerName}！+100 XP獲得にゃ！`;
        document.getElementById('explanationPanel').classList.remove('show');

        // Story update
        document.getElementById('storyText').innerHTML =
            `<strong>賢者だんどり～にゃ：</strong>素晴らしいにゃ、${playerName}！知識の光がまた一つ灯ったにゃ！`;

        // Level up check
        checkLevelUp();
    } else {
        wrongAnswers.push(currentIndex);
        progressStates[currentIndex] = 'wrong';

        feedbackArea.className = 'feedback incorrect show';
        document.getElementById('feedbackImg').src = INCORRECT_IMGS[Math.floor(Math.random() * INCORRECT_IMGS.length)];
        document.getElementById('feedbackTitle').textContent = '残念...不正解にゃ';
        document.getElementById('feedbackMsg').textContent = 'だが、失敗から学ぶことこそ真の知恵にゃ！';

        // Show explanation
        const panel = document.getElementById('explanationPanel');
        panel.classList.add('show');
        const correctChoice = q.choices.find(c => c.value === q.correctAnswer);
        document.getElementById('correctAnswerDisplay').textContent = correctChoice.text;
        document.getElementById('explanationText').innerHTML = q.explanation;
        document.getElementById('metaphorArea').innerHTML = '<strong>&#x1F4A1; たとえ話：</strong>' + q.metaphor;
        document.getElementById('supplementArea').innerHTML = q.supplement;

        // Story update
        document.getElementById('storyText').innerHTML =
            `<strong>賢者だんどり～にゃ：</strong>惜しいにゃ、${playerName}。でもここで学んだことは忘れないにゃ！`;
    }

    updateStatus();
    renderProgressDots();
    document.getElementById('nextBtn').classList.remove('hidden');
}

function checkLevelUp() {
    let newLevel = 1;
    let newTitle = "見習い守護者";
    for (let i = TITLES.length - 1; i >= 0; i--) {
        if (totalXP >= TITLES[i].xp) {
            newLevel = TITLES[i].level;
            newTitle = TITLES[i].name;
            break;
        }
    }

    if (newLevel > playerLevel) {
        playerLevel = newLevel;
        playerTitleName = newTitle;
        updateStatus();

        // Flash effect
        const flash = document.createElement('div');
        flash.className = 'level-up-flash';
        document.body.appendChild(flash);
        setTimeout(() => flash.remove(), 1000);

        // Badge popup
        showBadge('\u{2B50}', `Lv.${playerLevel} ${playerTitleName}`, 'レベルアップ！新たな称号を獲得！');
        earnedBadges.push({ icon: '\u{2B50}', name: playerTitleName });
    }

    // Special badges
    if (currentIndex === 3 && wrongAnswers.length === 0 && !earnedBadges.find(b => b.name === '前半パーフェクト')) {
        showBadge('\u{1F525}', '前半パーフェクト', '前半4問を全問正解！');
        earnedBadges.push({ icon: '\u{1F525}', name: '前半パーフェクト' });
    }
}

function showBadge(icon, title, desc) {
    const popup = document.getElementById('badgePopup');
    const overlay = document.getElementById('overlay');
    document.getElementById('badgeIcon').textContent = icon;
    document.getElementById('badgeTitle').textContent = title;
    document.getElementById('badgeDesc').textContent = desc;
    popup.classList.add('show');
    overlay.classList.add('show');
    setTimeout(() => {
        popup.classList.remove('show');
        overlay.classList.remove('show');
    }, 2000);
}

function nextQuestion() {
    currentIndex++;
    loadQuestion();
}

async function endGame() {
    document.getElementById('gameScreen').classList.add('hidden');
    document.getElementById('statusBar').classList.remove('active');
    document.getElementById('xpBarContainer').classList.remove('active');
    document.getElementById('gameOverScreen').classList.remove('hidden');

    const correctCount = questions.length - wrongAnswers.length;

    document.getElementById('finalScore').textContent = `${totalXP} XP`;
    document.getElementById('finalTitle').textContent = playerTitleName;

    let msg = '';
    if (correctCount === questions.length) {
        msg = `全問正解！${playerName}は真の極洋の守護者にゃ！`;
        earnedBadges.push({ icon: '\u{1F451}', name: '完全制覇' });
        createConfetti();
    } else if (correctCount >= 6) {
        msg = `${correctCount}/${questions.length}問正解！立派な守護者にゃ！`;
    } else {
        msg = `${correctCount}/${questions.length}問正解。もう一度挑戦して知識を深めるにゃ！`;
    }
    document.getElementById('finalMsg').textContent = msg;

    // Badges
    const badgesDiv = document.getElementById('badgesEarned');
    badgesDiv.innerHTML = '';
    earnedBadges.forEach(b => {
        const item = document.createElement('div');
        item.className = 'badge-item';
        item.innerHTML = `<span class="badge-emoji">${b.icon}</span>${b.name}`;
        badgesDiv.appendChild(item);
    });

    // Wrong answers review
    const wrongList = document.getElementById('wrongList');
    wrongList.innerHTML = '';
    if (wrongAnswers.length > 0) {
        document.getElementById('wrongReview').style.display = 'block';
        wrongAnswers.forEach(idx => {
            const q = questions[idx];
            const correctChoice = q.choices.find(c => c.value === q.correctAnswer);
            const item = document.createElement('div');
            item.className = 'wrong-item';
            item.innerHTML = `
                <div class="wrong-q">${STAGES[q.stage].chapter}：${q.question.replace(/<[^>]*>/g, '').substring(0, 80)}...</div>
                <div class="wrong-a">正解：${correctChoice.text}</div>
                <div class="wrong-exp">${q.explanation.substring(0, 100)}...</div>
            `;
            wrongList.appendChild(item);
        });
    } else {
        document.getElementById('wrongReview').style.display = 'none';
    }

    // Save score and start polling for shared leaderboard
    await saveScore(playerEmail, playerName, totalXP, correctCount, questions.length, playerTitleName);
    startScoreboardPolling();
}

function createConfetti() {
    const colors = ['#6366f1', '#f59e0b', '#10b981', '#ef4444', '#ec4899', '#8b5cf6'];
    for (let i = 0; i < 60; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + 'vw';
        piece.style.top = '-10px';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        piece.style.width = (5 + Math.random() * 8) + 'px';
        piece.style.height = (5 + Math.random() * 8) + 'px';
        document.body.appendChild(piece);

        const duration = 2 + Math.random() * 3;
        const xDrift = (Math.random() - 0.5) * 200;
        piece.animate([
            { transform: `translate(0, 0) rotate(0deg)`, opacity: 1 },
            { transform: `translate(${xDrift}px, 100vh) rotate(${360 + Math.random()*360}deg)`, opacity: 0 }
        ], {
            duration: duration * 1000,
            easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)',
            delay: Math.random() * 500
        }).onfinish = () => piece.remove();
    }
}
